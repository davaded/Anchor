name: Publish anchor-workflow

on:
  push:
    tags:
      - "anchor-workflow-v*"

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
          registry-url: https://registry.npmjs.org

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Validate tag matches package version
        shell: bash
        run: |
          TAG_VERSION="${GITHUB_REF_NAME#anchor-workflow-v}"
          PACKAGE_VERSION=$(node -p "require('./packages/installer/package.json').version")
          if [ "$TAG_VERSION" != "$PACKAGE_VERSION" ]; then
            echo "Tag version $TAG_VERSION does not match package version $PACKAGE_VERSION"
            exit 1
          fi

      - name: Run tests
        run: pnpm test

      - name: Dry-run package
        run: pnpm --dir packages/installer run pack:check

      - name: Publish package
        working-directory: packages/installer
        env:
          NODE_AUTH_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: npm publish --access public
